name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json
            functions/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Test frontend
        run: npm test

      - name: Build frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: ""
          VITE_ENABLE_APPLE_SIGN_IN: "false"

      - name: Install standalone backend dependencies
        run: npm ci
        working-directory: backend

      - name: Test standalone backend
        run: npm test
        working-directory: backend

      - name: Install function dependencies
        run: npm ci
        working-directory: functions

      - name: Test functions
        run: npm test
        working-directory: functions
